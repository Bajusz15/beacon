# Beacon Monitor Configuration
# Generated by Beacon Configuration Wizard
# 
# This is an example output from running: beacon setup-wizard
# The wizard generates THREE files:
#   1. beacon.monitor.yml (this file) - Monitoring configuration
#   2. .env - Environment variables with placeholders
#   3. beacon.bootstrap.yml - Bootstrap configuration template
#
# Usage:
#   beacon setup-wizard
#   # Or with custom paths:
#   beacon setup-wizard --config ./beacon.monitor.yml --env .env

device:
  name: My Raspberry Pi
  location: Unknown
  environment: production
  tags:
    - raspberry-pi

checks:
  - name: Web Server
    type: http
    url: http://localhost:8080
    interval: 30s
    expect_status: 200

plugins:
  - name: email
    enabled: true
    smtp_host: ${SMTP_HOST}
    smtp_port: ${SMTP_PORT}
    smtp_user: ${SMTP_USER}
    smtp_pass: ${SMTP_PASSWORD}
    from: ${SMTP_FROM}
    to:
      - ${SMTP_TO}

alert_rules:
  - check: "*"
    severity: critical
    plugins:
      - email
    cooldown: 5m

system_metrics:
  enabled: true
  interval: 60s
  cpu: true
  memory: true
  disk: true
  load_average: true

report:
  send_to: https://beaconinfra.com/api
  token: ${BEACONINFRA_TOKEN}
