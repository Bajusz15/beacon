name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.21, 1.22, 1.23]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
    
    - name: Verify dependencies
      run: go mod verify
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Generate coverage report
      if: matrix.go-version == '1.23'
      run: go tool cover -html=coverage.out -o coverage.html
    
    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.23'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Upload coverage report
      if: matrix.go-version == '1.23'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: Build Linux AMD64
      run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o beacon-linux_amd64 ./cmd/beacon
    
    - name: Build Linux ARM64
      run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o beacon-linux_arm64 ./cmd/beacon
    
    - name: Build Linux ARM
      run: GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o beacon-linux_arm ./cmd/beacon
    
    - name: Build macOS AMD64
      run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o beacon-darwin_amd64 ./cmd/beacon
    
    - name: Build macOS ARM64
      run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o beacon-darwin_arm64 ./cmd/beacon
    
    - name: Generate checksums
      run: |
        sha256sum beacon-linux_amd64 beacon-linux_arm64 beacon-linux_arm beacon-darwin_amd64 beacon-darwin_arm64 > checksums.txt
        cat checksums.txt
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: beacon-binaries
        path: |
          beacon-linux_amd64
          beacon-linux_arm64
          beacon-linux_arm
          beacon-darwin_amd64
          beacon-darwin_arm64
          checksums.txt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: '-fmt sarif -out gosec.sarif ./...'
    
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: gosec.sarif
    
    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  e2e:
    name: End-to-End Integration Test
    runs-on: ubuntu-latest
    needs: [test, build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: beacon-binaries
        path: ./
    
    - name: Make beacon executable
      run: chmod +x beacon-linux_amd64
    
    - name: Install beacon binary
      run: |
        sudo cp beacon-linux_amd64 /usr/local/bin/beacon
        beacon --version
    
    - name: Set up Git
      run: |
        git config --global user.name "Beacon E2E Test"
        git config --global user.email "test@beacon.local"

    - name: Run E2E Integration Test (Docker)
      run: |
        # Build and run E2E test in Docker
        docker-compose -f docker-compose.e2e.yml up --build --abort-on-container-exit

        # Check if test passed
        if [ -f test-results/e2e-result.txt ]; then
          echo "✅ E2E Test Results:"
          cat test-results/e2e-result.txt
        else
          echo "❌ E2E Test failed - no results file found"
          exit 1
        fi
      env:
        CI: true
        BEACON_E2E_TEST: 1
    
    - name: Upload E2E test logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs
        path: |
          test-results/
          ~/.beacon/logs/