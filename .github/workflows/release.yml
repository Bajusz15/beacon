name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: Build Linux AMD64
      run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o beacon-linux_amd64 ./cmd/beacon
    
    - name: Build Linux ARM64
      run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o beacon-linux_arm64 ./cmd/beacon
    
    - name: Build Linux ARM
      run: GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o beacon-linux_arm ./cmd/beacon
    
    - name: Build macOS AMD64
      run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o beacon-darwin_amd64 ./cmd/beacon
    
    - name: Build macOS ARM64
      run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o beacon-darwin_arm64 ./cmd/beacon
    
    - name: Generate checksums
      run: |
        sha256sum beacon-linux_amd64 beacon-linux_arm64 beacon-linux_arm beacon-darwin_amd64 beacon-darwin_arm64 > SHA256SUMS.txt
        cat SHA256SUMS.txt
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          beacon-linux_amd64
          beacon-linux_arm64
          beacon-linux_arm
          beacon-darwin_amd64
          beacon-darwin_arm64
          SHA256SUMS.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}