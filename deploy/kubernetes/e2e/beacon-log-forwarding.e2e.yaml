# E2E: Pod that writes logs to a shared volume; Beacon tails the file and forwards to mock-log-server.
# Requires mock-log-server Deployment + Service to be running and images beacon:e2e.
apiVersion: v1
kind: ConfigMap
metadata:
  name: beacon-e2e-monitor-config
  namespace: default
data:
  monitor.yml: |
    device:
      name: e2e-log-forwarding
    log_sources:
      - name: shared-file
        type: file
        enabled: true
        file_path: /shared/app.log
        interval: 2s
        max_lines: 100
    report:
      send_to: "http://mock-log-server:8080"
      token: "e2e-test-token"
      log_batch_size: 1
      log_flush_interval: 5s
---
apiVersion: v1
kind: Pod
metadata:
  name: beacon-log-forwarding-e2e
  namespace: default
  labels:
    app: beacon-log-forwarding-e2e
spec:
  restartPolicy: Never
  containers:
    # Write a known line to /shared/app.log so Beacon can tail and forward to mock server
    - name: log-writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          touch /shared/app.log
          while true; do
            echo "E2E_LOG_FORWARDING_MARKER_$(date -Iseconds)" >> /shared/app.log
            sleep 2
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /shared
    - name: beacon
      image: beacon:e2e
      imagePullPolicy: IfNotPresent
      env:
        - name: HOME
          value: /tmp
      command:
        - /usr/local/bin/beacon
        - monitor
        - -f
        - /config/monitor.yml
      volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: shared-logs
          mountPath: /shared
          readOnly: true
  volumes:
    - name: config
      configMap:
        name: beacon-e2e-monitor-config
    - name: shared-logs
      emptyDir: {}
