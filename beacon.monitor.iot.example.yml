# Beacon Monitor Configuration Template - IoT Device
# This template is optimized for IoT devices like Raspberry Pi

# Device identification
device:
  name: "Raspberry Pi IoT Device"
  location: "Home Lab"
  tags: ["iot", "raspberry-pi", "sensor", "home-automation"]
  environment: "development"

# Health checks optimized for IoT devices
checks:
  # System health checks
  - name: "CPU Temperature"
    type: command
    cmd: "cat /sys/class/thermal/thermal_zone0/temp | awk '{print $1/1000}'"
    interval: 120s
    timeout: 5s

  - name: "Memory Usage"
    type: command
    cmd: "free | grep Mem | awk '{printf \"%.1f\", $3/$2 * 100.0}'"
    interval: 120s
    timeout: 5s

  - name: "Disk Usage"
    type: command
    cmd: "df -h / | tail -1 | awk '{print $5}' | sed 's/%//'"
    interval: 300s
    timeout: 5s

  - name: "Load Average"
    type: command
    cmd: "uptime | awk -F'load average:' '{print $2}' | awk '{print $1}' | sed 's/,//'"
    interval: 120s
    timeout: 5s

  # Network connectivity
  - name: "Internet Connectivity"
    type: command
    cmd: "ping -c 1 8.8.8.8 > /dev/null 2>&1 && echo 'connected' || echo 'disconnected'"
    interval: 60s
    timeout: 10s
    expect_output: "connected"

  - name: "WiFi Signal Strength"
    type: command
    cmd: "iwconfig wlan0 | grep 'Signal level' | awk '{print $4}' | sed 's/dBm//'"
    interval: 300s
    timeout: 5s

  # GPIO and sensor checks
  - name: "GPIO Status"
    type: command
    cmd: "ls /sys/class/gpio/ | wc -l"
    interval: 300s
    timeout: 5s

  - name: "I2C Devices"
    type: command
    cmd: "i2cdetect -y 1 | grep -c '[0-9][0-9]'"
    interval: 600s
    timeout: 10s

  # Service health
  - name: "SSH Service"
    type: port
    host: localhost
    port: 22
    interval: 60s
    timeout: 5s

  - name: "HTTP Service"
    type: port
    host: localhost
    port: 8080
    interval: 30s
    timeout: 5s

  # Custom IoT application checks
  - name: "Sensor Data Collection"
    type: command
    cmd: "ps aux | grep -c 'sensor_collector'"
    interval: 60s
    timeout: 5s
    expect_output: "1"

  - name: "MQTT Broker Connection"
    type: command
    cmd: "mosquitto_pub -h localhost -t test -m 'ping' && echo 'connected' || echo 'disconnected'"
    interval: 120s
    timeout: 10s
    expect_output: "connected"

  # Temperature monitoring
  - name: "CPU Temperature Alert"
    type: command
    cmd: "cat /sys/class/thermal/thermal_zone0/temp | awk '{if($1/1000 > 70) print \"hot\"; else print \"ok\"}'"
    interval: 60s
    timeout: 5s
    expect_output: "ok"

# Log sources for IoT devices
log_sources:
  # System logs
  - name: "System Logs"
    type: command
    enabled: true
    command: "journalctl --since '5 minutes ago' -p err -n 20"
    interval: 300s
    filters:
      - "error"
      - "warn"
      - "fail"

  # Application logs
  - name: "IoT Application Logs"
    type: file
    enabled: true
    file_path: "/var/log/iot-app.log"
    interval: 60s
    max_lines: 50
    filters:
      - "ERROR"
      - "WARN"
      - "CRITICAL"

  # Sensor logs
  - name: "Sensor Logs"
    type: file
    enabled: true
    file_path: "/var/log/sensors.log"
    interval: 120s
    max_lines: 30
    filters:
      - "ERROR"
      - "TIMEOUT"
      - "DISCONNECTED"

  # Network logs
  - name: "Network Logs"
    type: command
    enabled: true
    command: "dmesg | grep -i 'network\\|wifi\\|ethernet' | tail -10"
    interval: 300s
    filters:
      - "error"
      - "fail"
      - "disconnect"

# Reporting configuration
report:
  send_to: https://beacoinfra.dev/api
  token: YOUR_BEACONWATCH_API_KEY
  interval: 120s  # Longer interval for IoT devices
  prometheus_metrics: true
  prometheus_port: 9100
  prometheus_path: "/metrics"

# System metrics collection
system_metrics:
  enabled: true
  interval: 120s  # Longer interval for IoT devices
  include_cpu: true
  include_memory: true
  include_disk: true
  include_network: true
  include_load: true
  include_temperature: true  # IoT-specific metric
