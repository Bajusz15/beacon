
services:
  beacon-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: beacon-e2e-test
    volumes:
      - ./test-results:/app/test-results
    environment:
      - CI=true
      - BEACON_E2E_TEST=1
    ports:
      - "8080:8080"  # Git HTTP server
      - "8081:8081"  # Beacon HTTP server
    # Run the e2e test script
    command: /app/test-e2e-cli.sh
