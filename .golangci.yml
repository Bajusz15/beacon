version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - dupl
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: Use stdlib errors package instead
    funlen:
      lines: 100
      statements: 60
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 140
    misspell:
      locale: US
    errcheck:
      exclude-functions:
        - '(*beacon/internal/errors.BeaconError).WithTroubleshooting'
        - '(*beacon/internal/errors.BeaconError).WithNextSteps'
        - '(*beacon/internal/errors.BeaconError).WithDocumentation'
  exclusions:
    generated: lax
    rules:
      - linters:
          - staticcheck
        text: 'ST1000:'
      - linters:
          - errcheck
        text: 'WithTroubleshooting|WithNextSteps|WithDocumentation'
    paths:
      - vendor
      - internal/testdata
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - beacon
  exclusions:
    generated: lax
    paths:
      - vendor
      - internal/testdata
      - third_party$
      - builtin$
      - examples$
