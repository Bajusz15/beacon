run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters-settings:
  goimports:
    local-prefixes: beacon
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - revive
    - gocyclo
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - asciicheck
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - goprintffuncname
    - gosec
    - lll
    - nakedret
    - prealloc
    - rowserrcheck
    - sqlnorows
    - stylecheck
    - unconvert
    - unparam
    - whitespace
    - wsl

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - internal/testdata