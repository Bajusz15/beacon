# Beacon Monitor Configuration (example wizard output)
#
# The wizard generates project monitoring YAML (checks, plugins, alert rules).
# Device name, API key, cloud heartbeats, and system_metrics belong in ~/.beacon/config.yaml.
#
#   beacon setup-wizard
#
# See also: examples/beacon.monitor.example.yml

checks:
  - name: Web Server
    type: http
    url: http://localhost:8080
    interval: 30s
    expect_status: 200

plugins:
  - name: email
    enabled: true
    smtp_host: ${SMTP_HOST}
    smtp_port: ${SMTP_PORT}
    smtp_user: ${SMTP_USER}
    smtp_pass: ${SMTP_PASSWORD}
    from: ${SMTP_FROM}
    to:
      - ${SMTP_TO}

alert_rules:
  - check: "*"
    severity: critical
    plugins:
      - email
    cooldown: 5m
