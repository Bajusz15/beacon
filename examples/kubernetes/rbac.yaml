# Minimal RBAC for Beacon Kubernetes observer (read-only).
# Apply to the namespace where Beacon runs, or use a ClusterRole + ClusterRoleBinding for all namespaces.
# No create, patch, delete - only get, list, watch.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beacon-observer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: beacon-observer
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: beacon-observer
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: beacon-observer
subjects:
  - kind: ServiceAccount
    name: beacon-observer
    namespace: default
