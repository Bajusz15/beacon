# Beacon Configuration with Key Management
# This example shows how to use the new key management system

# Device configuration
device:
  name: "production-server-01"
  location: "datacenter-west"
  tags: ["production", "web-server", "nginx"]
  environment: "production"

# Health checks
checks:
  - name: "nginx-health"
    type: "http"
    url: "http://localhost/health"
    method: "GET"
    interval: 30s
    timeout: 10s
    expected_status_codes: [200]
    
  - name: "database-connection"
    type: "port"
    host: "localhost"
    port: 5432
    interval: 60s
    timeout: 5s

# System metrics collection
system_metrics:
  enabled: true
  interval: 60s
  include_cpu: true
  include_memory: true
  include_disk: true
  include_load: true

# Log sources
log_sources:
  - name: "nginx-access"
    type: "file"
    path: "/var/log/nginx/access.log"
    interval: 30s
    max_lines: 100
    filters:
      - "error"
      - "warn"
      
  - name: "application-logs"
    type: "file"
    path: "/var/log/app/application.log"
    interval: 60s
    max_lines: 50

# Reporting configuration with key management
report:
  send_to: https://beaconwatch.dev/api
  # Instead of hardcoding the token, reference a stored key
  token_name: "production-api-key"  # This references a key stored via 'beacon keys add'
  prometheus_metrics: true
  prometheus_port: 9100
  prometheus_path: "/metrics"
  
  # Heartbeat configuration
  heartbeat:
    enabled: true
    interval: 30s

# -------------------------------------------
# KEY MANAGEMENT USAGE EXAMPLES
# -------------------------------------------

# 1. Add your main BeaconWatch API key:
# beacon keys add --name "production-api-key" --key "your-actual-beaconwatch-api-key" --provider "beaconwatch" --description "Production BeaconWatch API key"

# 2. Add GitHub token:
# beacon keys git add-token --provider "github" --token "ghp_your-token" --name "github-main"

# 3. Add Git tokens for deployment:
# beacon keys git add-token --provider "github" --token "ghp_your-token" --name "github-main"

# 4. List all stored keys:
# beacon keys list

# 5. Rotate a key when needed:
# beacon keys rotate --name "production-api-key" --new-key "new-api-key"

# 6. Validate keys:
# beacon keys validate --name "production-api-key"
# beacon keys git test-token --provider "github" --name "github-main"

# -------------------------------------------
# DEPLOYMENT CONFIGURATION WITH GIT TOKENS
# -------------------------------------------

# For deployment, create a separate beacon.deploy.yml:
# git:
#   provider: github
#   repository: your-org/your-repo
#   token_name: "github-main"        # References stored Git token
#   branch: main
#   auto_deploy: true
#   check_interval: 5m
#   deploy_command: "./deploy.sh"
#   rollback_command: "./rollback.sh"

# -------------------------------------------
# SECURITY BENEFITS
# -------------------------------------------

# 1. Encrypted Storage: All keys are encrypted using AES-GCM
# 2. No Hardcoded Secrets: Configuration files don't contain actual keys
# 3. Easy Rotation: Keys can be rotated without changing config files
# 4. Audit Trail: All key operations are logged
# 5. Provider Support: Separate management for different providers

# -------------------------------------------
# SIMPLE KEY MANAGEMENT WORKFLOW
# -------------------------------------------

# 1. Add keys using CLI: beacon keys add --name "key-name" --key "actual-key"
# 2. Reference keys in config: token_name: "key-name"
# 3. Rotate keys when needed: beacon keys rotate --name "key-name" --new-key "new-key"
# 4. Beacon automatically picks up new key via hot-reload
# 5. Monitoring continues seamlessly
