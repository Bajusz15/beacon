run:
  timeout: 5m
  tests: true

linters-settings:
  goimports:
    local-prefixes: beacon
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
  lll:
    line-length: 140
  funlen:
    lines: 100
    statements: 60
  depguard:
    rules:
      main:
        deny:
          - pkg: "github.com/pkg/errors"
            desc: "Use stdlib errors package instead"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocyclo
    - dupl
    - gosec
    - prealloc
    - stylecheck
    - unconvert
    - unparam
    - whitespace

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - internal/testdata
  exclude-rules:
    - linters:
        - stylecheck
      text: "ST1000:"

output:
  sort-results: true
  print-issued-lines: true
  show-stats: false