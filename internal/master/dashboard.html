<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>beacon · status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--base:#0A1628;--surface:#0F1F3A;--elevated:#162D50;
--amber:#F59E0B;--amber-hover:#D97706;--teal:#06B6D4;--teal-muted:#0D9488;--red:#EF4444;
--bright:#FFFFFF;--body:#CBD5E1;--muted:#94A3B8;--subtle:#64748B;
--border:rgba(255,255,255,0.06)
}
body{background:var(--base);color:var(--body);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;max-width:760px;margin:0 auto;padding:20px;font-size:14px;line-height:1.5}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;background:rgba(245,158,11,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:15px;font-weight:600;color:var(--amber)}
.brand-ver{font-size:11px;color:var(--subtle);margin-left:6px}
.brand-host{font-size:12px;color:var(--muted);margin-top:2px}
.uptime-box{text-align:right;font-size:11px;color:var(--subtle)}
.uptime-box span{color:var(--teal);font-weight:500}
.offline{display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:600}
.metric-sub{font-size:11px;color:var(--subtle);margin-top:6px}
.metric-bar{height:4px;border-radius:2px;background:var(--elevated);margin-top:8px;overflow:hidden}
.metric-fill{height:100%;border-radius:2px;transition:width .4s}
.section-title{font-size:12px;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}
.child-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-radius:8px;margin-bottom:6px;border-left:3px solid transparent}
.child-row.warn{border-left-color:var(--amber);border-radius:0 8px 8px 0}
.child-row.down{border-left-color:var(--red);border-radius:0 8px 8px 0}
.child-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.child-name{font-size:13px;font-weight:500;color:var(--bright);min-width:130px}
.child-ver{font-size:11px;color:var(--subtle);min-width:60px}
.child-deployed{font-size:11px;color:var(--subtle);min-width:80px}
.child-checks{font-size:11px;margin-left:auto}
.child-warn-detail{font-size:11px;color:var(--amber);padding:4px 14px 8px 32px;margin-top:-2px;margin-bottom:4px}
.events-section{background:var(--surface);border-radius:8px;padding:12px 14px;margin-top:16px}
.event-row{display:flex;align-items:baseline;gap:10px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.event-row:last-child{border-bottom:none}
.event-time{color:var(--subtle);min-width:40px;font-family:'SF Mono',monospace;font-size:11px;flex-shrink:0}
.event-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;flex-shrink:0}
.event-msg{color:var(--muted)}
.footer{display:flex;gap:16px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.footer a{color:var(--teal-muted);text-decoration:none}
.footer a:hover{color:var(--teal)}
.footer-sep{color:var(--subtle)}
</style>
</head>
<body>
<div id="offline" class="offline">Connection lost — retrying…</div>
<div class="hdr">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
        <circle cx="8" cy="8" r="3" fill="#F59E0B"/>
        <circle cx="8" cy="8" r="6" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.35"/>
      </svg>
    </div>
    <div>
      <div style="display:flex;align-items:baseline">
        <span class="brand-name">beacon</span>
        <span class="brand-ver" id="version">—</span>
      </div>
      <div class="brand-host" id="device-host">loading…</div>
    </div>
  </div>
  <div class="uptime-box">master uptime<br><span id="master-uptime">—</span></div>
</div>

<div class="metric-grid">
  <div class="metric-card">
    <div class="metric-label">CPU</div>
    <div class="metric-val" id="cpu-val" style="color:var(--teal)">—</div>
    <div class="metric-bar"><div class="metric-fill" id="cpu-bar" style="width:0;background:var(--teal)"></div></div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Memory</div>
    <div class="metric-val" id="mem-val" style="color:var(--teal)">—</div>
    <div class="metric-bar"><div class="metric-fill" id="mem-bar" style="width:0;background:var(--teal)"></div></div>
    <div class="metric-sub" id="mem-sub"></div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Disk</div>
    <div class="metric-val" id="disk-val" style="color:var(--teal)">—</div>
    <div class="metric-bar"><div class="metric-fill" id="disk-bar" style="width:0;background:var(--teal)"></div></div>
    <div class="metric-sub" id="disk-sub"></div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Load avg</div>
    <div class="metric-val" id="load-val">—</div>
    <div class="metric-sub" id="load-sub"></div>
  </div>
</div>

<div class="section-title" id="children-title">Children</div>
<div id="children-list"></div>

<div class="events-section">
  <div class="section-title" style="margin-top:0">Recent events</div>
  <div id="events-list"><div style="color:var(--subtle);font-size:12px">No events yet</div></div>
</div>

<div class="footer">
  <a href="metrics">/metrics</a>
  <a href="health">/health</a>
  <a href="api/status">/api/status</a>
  <span class="footer-sep" id="last-sync"></span>
</div>

<script>
var lastData = null;

function tColor(pct) {
  if (pct >= 85) return 'var(--red)';
  if (pct >= 60) return 'var(--amber)';
  return 'var(--teal)';
}

function statusColor(s) {
  if (s === 'healthy') return 'var(--teal)';
  if (s === 'degraded' || s === 'warning') return 'var(--amber)';
  if (s === 'down') return 'var(--red)';
  return 'var(--subtle)';
}

function relTime(iso) {
  if (!iso) return '';
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function fmtUptime(s) {
  if (!s) return '—';
  var d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
  if (d > 0) return d+'d '+h+'h';
  if (h > 0) return h+'h '+m+'m';
  if (m > 0) return m+'m';
  return s+'s';
}

function fmtGB(gb) { return gb < 1 ? (gb*1024).toFixed(0)+'MB' : gb.toFixed(1)+'GB'; }

function badgeStyle(type) {
  if (type==='deploy'||type==='sync'||type==='start') return 'background:rgba(6,182,212,.15);color:var(--teal)';
  if (type==='alert') return 'background:rgba(245,158,11,.15);color:var(--amber)';
  if (type==='restart') return 'background:rgba(245,158,11,.15);color:var(--amber)';
  return 'background:rgba(100,116,139,.15);color:var(--subtle)';
}

function setVal(id, text) { var el=document.getElementById(id); if(el) el.textContent=text; }
function setStyle(id, prop, val) { var el=document.getElementById(id); if(el) el.style[prop]=val; }

function render(d) {
  lastData = d;
  document.getElementById('offline').style.display='none';

  setVal('version', d.version ? ' '+d.version : '');
  var dev = d.device || {};
  var hostParts = [dev.hostname, dev.ip, dev.arch, dev.os].filter(Boolean);
  setVal('device-host', hostParts.join(' · '));

  var m = d.master || {};
  setVal('master-uptime', fmtUptime(m.uptime_seconds));

  var sys = d.system || {};

  var cpu = sys.cpu_percent || 0;
  setVal('cpu-val', cpu.toFixed(1)+'%');
  setStyle('cpu-val','color',tColor(cpu));
  setStyle('cpu-bar','width',Math.min(cpu,100)+'%');
  setStyle('cpu-bar','background',tColor(cpu));

  var mem = sys.memory_percent || 0;
  setVal('mem-val', mem.toFixed(1)+'%');
  setStyle('mem-val','color',tColor(mem));
  setStyle('mem-bar','width',Math.min(mem,100)+'%');
  setStyle('mem-bar','background',tColor(mem));
  if (sys.memory_used_mb && sys.memory_total_mb) {
    setVal('mem-sub', (sys.memory_used_mb/1024).toFixed(1)+'GB / '+(sys.memory_total_mb/1024).toFixed(1)+'GB');
  }

  var disk = sys.disk_percent || 0;
  setVal('disk-val', disk.toFixed(1)+'%');
  setStyle('disk-val','color',tColor(disk));
  setStyle('disk-bar','width',Math.min(disk,100)+'%');
  setStyle('disk-bar','background',tColor(disk));
  if (sys.disk_used_gb && sys.disk_total_gb) {
    setVal('disk-sub', fmtGB(sys.disk_used_gb)+' / '+fmtGB(sys.disk_total_gb));
  }

  var load = (sys.load_1m||0).toFixed(2);
  setVal('load-val', load);
  if (sys.load_5m != null && sys.load_15m != null) {
    setVal('load-sub', sys.load_5m.toFixed(2)+' · '+sys.load_15m.toFixed(2)+(sys.temperature_celsius?'  🌡 '+sys.temperature_celsius.toFixed(1)+'°C':''));
  }

  var children = d.children || [];
  var healthy=0, warn=0, down=0;
  children.forEach(function(c){
    if(c.status==='healthy') healthy++;
    else if(c.status==='down') down++;
    else if(c.status!=='unknown') warn++;
  });
  var titleParts = ['Children'];
  if(healthy) titleParts.push('<span style="color:var(--teal)">'+healthy+' healthy</span>');
  if(warn) titleParts.push('<span style="color:var(--amber)">'+warn+' warning</span>');
  if(down) titleParts.push('<span style="color:var(--red)">'+down+' down</span>');
  var ct = document.getElementById('children-title');
  if(ct) ct.innerHTML = titleParts.join(' · ');

  var cl = document.getElementById('children-list');
  if(cl) {
    if(!children.length) {
      cl.innerHTML = '<div style="color:var(--subtle);font-size:12px;padding:8px 0">No child agents running</div>';
    } else {
      cl.innerHTML = children.map(function(c) {
        var dot = '<div class="child-dot" style="background:'+statusColor(c.status)+'"></div>';
        var chk = c.checks || {};
        var chkColor = chk.failing>0 ? 'var(--amber)' : 'var(--teal)';
        var chkText = (chk.passing||0)+'/'+(chk.total||0)+' passing';
        var rowClass = c.status==='down' ? 'child-row down' : c.status==='degraded'||c.status==='warning' ? 'child-row warn' : 'child-row';
        var row = '<div class="'+rowClass+'">'+dot+
          '<div class="child-name">'+esc(c.name)+'</div>'+
          '<div class="child-ver">'+esc(c.version||'')+'</div>'+
          (c.deployed_at ? '<div class="child-deployed">'+relTime(c.deployed_at)+'</div>' : '<div class="child-deployed"></div>')+
          '<div class="child-checks" style="color:'+chkColor+'">'+chkText+'</div>'+
          '</div>';
        var detail = '';
        if(chk.failing>0 && chk.details) {
          chk.details.filter(function(d){return d.status==='failing';}).forEach(function(fd){
            detail += '<div class="child-warn-detail">⚠ '+esc(fd.name)+(fd.error?' — '+esc(fd.error):'')+'</div>';
          });
        }
        return row+detail;
      }).join('');
    }
  }

  var events = d.events || [];
  var el = document.getElementById('events-list');
  if(el) {
    if(!events.length) {
      el.innerHTML = '<div style="color:var(--subtle);font-size:12px">No events yet</div>';
    } else {
      var evHTML = events.slice().reverse().map(function(e){
        var t = new Date(e.timestamp);
        var timeStr = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
        var dur = e.duration_ms ? ' <span style="color:var(--subtle)">('+Math.round(e.duration_ms/1000)+'s)</span>' : '';
        return '<div class="event-row">'+
          '<span class="event-time">'+timeStr+'</span>'+
          '<span class="event-badge" style="'+badgeStyle(e.type)+'">'+esc(e.type)+'</span>'+
          '<span class="event-msg">'+(e.child?'<strong style="color:var(--body)">'+esc(e.child)+'</strong> ':'')+esc(e.message)+dur+'</span>'+
          '</div>';
      }).join('');
      el.innerHTML = evHTML;
    }
  }

  var cloud = d.cloud || {};
  var ls = document.getElementById('last-sync');
  if(ls && cloud.last_sync) {
    ls.textContent = 'cloud sync '+relTime(cloud.last_sync);
    ls.style.color = cloud.connected ? 'var(--teal)' : 'var(--subtle)';
  }
}

function showOffline() {
  document.getElementById('offline').style.display='block';
  if(lastData) {
    var els = document.querySelectorAll('.metric-card,.child-row,.events-section');
    els.forEach(function(e){ e.style.opacity='0.5'; });
  }
}

function clearOffline() {
  var els = document.querySelectorAll('.metric-card,.child-row,.events-section');
  els.forEach(function(e){ e.style.opacity=''; });
}

function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
  try {
    var res = await fetch('api/status');
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    clearOffline();
    render(data);
  } catch(e) {
    showOffline();
  }
}

document.addEventListener('DOMContentLoaded', function(){ refresh(); });
setInterval(refresh, 10000);
</script>
</body>
</html>
